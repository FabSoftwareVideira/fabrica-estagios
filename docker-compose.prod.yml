name: estagios-prod # ✅ Fix #3: project name explícito, alinha com deploy.yml

services:
  estagios-db:
    container_name: estagios-prod-db
    image: postgres:13
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/estagio_data
    volumes:
      - estagio_db_data:/var/lib/postgresql/estagio_data
    # ✅ Fix #4: porta removida — acesso apenas via rede interna Docker
    networks:
      - fabrica-network
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 3

  estagios-web:
    container_name: estagios-prod-web
    # ✅ Fix #1: fallback adicionado para APP_VERSION
    image: ${APP_IMAGE:-ghcr.io/fabsoftwarevideira/fabrica-estagios}:${APP_VERSION:-latest}
    # ✅ Fix #2: força pull da imagem remota sempre
    pull_policy: always
    ports:
      - "5000:5000"
    depends_on:
      estagios-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - APP_VERSION=${APP_VERSION}
      - APP_ENV=production
    labels:
      - org.opencontainers.image.version=${APP_VERSION}
      - net.brdrive.fsw-ifc-estagios.environment=production
    command: >
      sh -c "flask db upgrade && gunicorn --bind 0.0.0.0:5000 app:app --workers ${GUNICORN_WORKERS} --threads ${GUNICORN_THREADS} --timeout ${GUNICORN_TIMEOUT}"
    networks:
      - fabrica-network
    restart: always

volumes:
  estagio_db_data:


networks:
  fabrica-network:
    external: true
