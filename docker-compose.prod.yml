services:
  estagios-db:
    container_name: estagios-prod-db
    image: postgres:18.3
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/estagio_data
    volumes:
      - estagio_db_data:/var/lib/postgresql/estagio_data
    ports:
      - "50236:5432"
    networks:
      - fabrica-network
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 3

  estagios-web:
    container_name: estagios-prod-web
    build:
      context: .
      dockerfile: Dockerfile
      target: prod # Use the 'prod' stage from the Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      estagios-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
    command: >
      sh -c "flask db upgrade && gunicorn --bind 0.0.0.0:5000 app:app --workers ${GUNICORN_WORKERS} --threads ${GUNICORN_THREADS} --timeout ${GUNICORN_TIMEOUT}"
    networks:
      - fabrica-network
    restart: always

volumes:
  estagio_db_data:


networks:
  fabrica-network:
    driver: bridge