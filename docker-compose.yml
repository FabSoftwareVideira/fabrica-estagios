services:
  estagios-db:
    container_name: estagios-dev-db
    image: postgres:18.3
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/estagio_data
    volumes:
      - estagio_db_data:/var/lib/postgresql/estagio_data
    ports:
      - "5432:5432"
    networks:
      - estagios-network
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 3

  estagios-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev # Use the 'dev' stage from the Dockerfile
      args:
        APP_VERSION: ${APP_VERSION}
        APP_ENV: development
    container_name: estagios-dev-web
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      estagios-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - APP_VERSION=${APP_VERSION}
      - APP_ENV=development
      - SQLALCHEMY_DATABASE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@estagios-db/${POSTGRES_DB}
    labels:
      - org.opencontainers.image.version=${APP_VERSION}
      - net.brdrive.fsw-ifc-estagios.environment=development
    command: >
      sh -c "flask db upgrade && flask run --host=0.0.0.0 --port=5000 --debug"
    networks:
      - estagios-network
    restart: always

volumes:
  estagio_db_data:


networks:
  estagios-network:
    driver: bridge
