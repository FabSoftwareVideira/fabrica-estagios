name: Continuous Deployment

on:
  workflow_run:
    workflows:
      - Publish Container Image
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  APP_DIR: .
  PROJECT_NAME: estagios-prod
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  deploy:
    name: 🚀 Deploy ${{ github.event.repository.name }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: 📂 Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: 🔐 Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧾 Definir nome da imagem
        run: |
          REPOSITORY_OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "GHCR_IMAGE=ghcr.io/${REPOSITORY_OWNER_LOWER}/fabrica-estagios" >> "$GITHUB_ENV"

      - name: 🔄 Atualizar tags Git locais
        working-directory: ${{ env.APP_DIR }}
        run: |
          git fetch --force --tags origin

      # deploy.yml - steps corrigidos

      - name: 🏷️ Definir tag da imagem
        working-directory: ${{ env.APP_DIR }}
        run: |
          # Usar o SHA exato do workflow que publicou a imagem
          TARGET_SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          
          # ✅ Passar o SHA corretamente ao git describe
          IMAGE_TAG="$(git describe --tags --always ${TARGET_SHA} 2>/dev/null || echo '')"
          
          # Fallback explícito e verbose para debugar
          if [[ -z "${IMAGE_TAG}" ]]; then
            echo "⚠️ git describe falhou para ${TARGET_SHA}, usando SHA curto"
            IMAGE_TAG="v0.1.0-dev-$(echo ${TARGET_SHA} | cut -c1-7)"
          fi
          
          if [[ ! "${IMAGE_TAG}" =~ ^v ]]; then
            IMAGE_TAG="v0.1.0-dev-${IMAGE_TAG}"
          fi
          
          echo "✅ IMAGE_TAG resolvida: ${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: 📄 Criar arquivo .env
        working-directory: ${{ env.APP_DIR }}
        run: |
          printf '%s\n' "${{ secrets.ENV_FILE }}" | grep -vE '^(APP_IMAGE|APP_VERSION|APP_ENV)=' > .env
          {
            echo "APP_IMAGE=${{ env.GHCR_IMAGE }}"
            echo "APP_VERSION=${IMAGE_TAG}"
            echo "APP_ENV=production"
          } >> .env
          
          # ✅ Log para confirmar o que vai ser deployado
          echo "📦 Imagem que será deployada: ${{ env.GHCR_IMAGE }}:${IMAGE_TAG}"

      - name: 🐳 Atualizar e Subir Containers
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "Atualizando imagens para o projeto: ${{ env.PROJECT_NAME }}"
          docker compose -f ${{ env.COMPOSE_FILE }} pull

          echo "Iniciando serviços..."
          # ✅ --pull always garante que usa a imagem recém baixada
          docker compose -f ${{ env.COMPOSE_FILE }} up -d --remove-orphans --pull always

      - name: 📊 Status Final
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "--- Containers Ativos ---"
          docker compose -f ${{ env.COMPOSE_FILE }} ps

          echo "--- Consumo de Recursos ---"
          CONTAINER_IDS=$(docker ps -q --filter "label=com.docker.compose.project=${{ env.PROJECT_NAME }}")
          if [ -n "$CONTAINER_IDS" ]; then
            docker stats --no-stream $CONTAINER_IDS
          else
            echo "Nenhum container encontrado para o projeto ${{ env.PROJECT_NAME }}"
          fi

      - name: 🧹 Limpeza de Imagens Antigas
        if: always()
        run: |
          echo "Removendo imagens não utilizadas..."
          docker image prune -f