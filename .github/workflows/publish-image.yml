name: Publish Container Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Definir tags da imagem
        id: vars
        run: |
          REPOSITORY_OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${REPOSITORY_OWNER_LOWER}/fabrica-estagios"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          APP_VERSION="sha-${SHORT_SHA}"

          TAGS="${IMAGE_NAME}:latest"
          TAGS+=$'\n'"${IMAGE_NAME}:${APP_VERSION}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            TAGS+=$'\n'"${IMAGE_NAME}:${RELEASE_VERSION}"
            APP_VERSION="${RELEASE_VERSION}"
          fi

          {
            echo "image_name=${IMAGE_NAME}"
            echo "app_version=${APP_VERSION}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.app_version }}
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.app_version }}
            APP_ENV=production
